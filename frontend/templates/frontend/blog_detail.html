{% extends 'frontend/base.html' %}
{% block title %}Blog — Phil Explorer{% endblock %}

{% block extra_head %}
<style>
  .blog-hero {
    background: var(--forest);
    min-height: 380px;
    position: relative;
    display: flex; align-items: flex-end;
    overflow: hidden;
  }
  .blog-hero-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    opacity: .45;
  }
  .blog-hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(27,67,50,.95) 0%, rgba(27,67,50,.3) 70%, transparent 100%);
  }
  .blog-hero-content {
    position: relative; z-index: 2;
    padding: 0 24px 48px;
    max-width: 860px; margin: 0 auto; width: 100%;
  }
  .blog-hero-content .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: rgba(255,255,255,.7); font-size: .85rem;
    text-decoration: none; margin-bottom: 20px;
    transition: color .15s;
  }
  .blog-hero-content .back-link:hover { color: var(--white); }
  .blog-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--white); line-height: 1.2;
    margin-bottom: 16px;
  }
  .blog-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    color: rgba(255,255,255,.7); font-size: .83rem;
  }
  .blog-meta span { display: flex; align-items: center; gap: 5px; }

  /* ── ARTICLE ── */
  .article-layout {
    max-width: 860px; margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .article-body {
    font-size: 1.02rem; line-height: 1.85;
    color: #2D2D2D;
  }
  .article-body p + p { margin-top: 1.2em; }

  .article-skeleton { animation: pulse 1.2s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity:1; } to { opacity:.45; } }
  .skel-line {
    height: 1em; border-radius: 4px;
    background: var(--border);
    margin-bottom: .9em;
  }

  /* ── RELATED POSTS ── */
  .related-section {
    background: var(--sand);
    padding: 56px 24px;
    border-top: 1px solid var(--border);
  }
  .related-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px; margin-top: 28px;
  }
  .related-card { text-decoration: none; color: inherit; display: block; }
  .related-card-img {
    width: 100%; height: 150px; object-fit: cover;
    background: var(--mist);
    display: flex; align-items: center; justify-content: center; font-size: 2rem;
  }
  .related-card-body { padding: 16px 18px 18px; }
  .related-card-title { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 6px; line-height: 1.3; }
  .related-card-date { font-size: .77rem; color: var(--midtone); }

  /* ── ADMIN ACTIONS (if logged in) ── */
  .admin-bar {
    background: var(--forest);
    color: var(--white);
    padding: 10px 24px;
    display: none;
    align-items: center;
    gap: 12px;
    font-size: .85rem;
  }
  .admin-bar.visible { display: flex; }
  .admin-bar a, .admin-bar button {
    color: var(--sage); font-size: .85rem; text-decoration: none; background: none;
    border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .admin-bar a:hover, .admin-bar button:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<!-- Admin bar for logged-in users -->
<div class="admin-bar" id="admin-bar">
  <span>Admin:</span>
  <a href="http://localhost:8000/admin/" target="_blank">Django Admin ↗</a>
  <button onclick="deleteBlog()">🗑 Move to Trash</button>
</div>

<!-- Blog Hero -->
<div class="blog-hero" id="blog-hero">
  <img id="blog-hero-img" class="blog-hero-img" src="" alt="" style="display:none;" />
  <div class="blog-hero-overlay"></div>
  <div class="blog-hero-content">
    <a href="/blogs/" class="back-link">← All blogs</a>
    <h1 id="blog-title">Loading…</h1>
    <div class="blog-meta" id="blog-meta"></div>
  </div>
</div>

<!-- Article -->
<div class="article-layout">
  <div class="article-body" id="article-body">
    <div class="article-skeleton">
      <div class="skel-line" style="width:90%"></div>
      <div class="skel-line" style="width:100%"></div>
      <div class="skel-line" style="width:85%"></div>
      <div class="skel-line" style="width:95%"></div>
      <div class="skel-line" style="width:70%"></div>
      <br/>
      <div class="skel-line" style="width:100%"></div>
      <div class="skel-line" style="width:88%"></div>
      <div class="skel-line" style="width:75%"></div>
    </div>
  </div>
</div>

<!-- Related -->
<div class="related-section">
  <div style="max-width:1200px;margin:0 auto;">
    <p style="font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);">More Stories</p>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-top:8px;">You might also like</h2>
    <div class="related-grid" id="related-grid">
      <div class="spinner"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const SLUG = "{{ slug }}";

  async function loadBlog() {
    try {
      const blog = await apiFetch(`/blog/${SLUG}`);

      // Update title tag
      document.title = `${blog.title} — Phil Explorer`;

      // Hero
      document.getElementById('blog-title').textContent = blog.title;

      const imgEl = document.getElementById('blog-hero-img');
      if (blog.image) {
        const src = blog.image.startsWith('http') ? blog.image : 'http://localhost:8000' + blog.image;
        imgEl.src = src;
        imgEl.alt = blog.title;
        imgEl.style.display = 'block';
      }

      const pubDate = blog.date_published
        ? new Date(blog.date_published).toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'numeric'})
        : '';
      const updDate = blog.date_updated
        ? new Date(blog.date_updated).toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'})
        : '';
      document.getElementById('blog-meta').innerHTML = `
        ${pubDate ? `<span>📅 ${pubDate}</span>` : ''}
        ${updDate ? `<span>✏️ Updated ${updDate}</span>` : ''}
      `;

      // Body — render paragraphs
      document.getElementById('article-body').innerHTML = blog.description
        .split(/\n+/)
        .filter(p => p.trim())
        .map(p => `<p>${p.trim()}</p>`)
        .join('');

      // Admin bar
      if (getToken()) {
        document.getElementById('admin-bar').classList.add('visible');
      }

    } catch(e) {
      document.getElementById('blog-title').textContent = 'Blog not found';
      document.getElementById('article-body').innerHTML =
        '<p style="color:var(--midtone);">This blog post could not be loaded. It may have been removed or the backend is offline.</p>';
    }
  }

  async function loadRelated() {
    try {
      const data = await apiFetch('/blog/?limit=3');
      const blogs = (data.results || data).filter(b => b.slug !== SLUG).slice(0, 3);
      const grid = document.getElementById('related-grid');
      if (!blogs.length) { grid.innerHTML = '<p style="color:var(--midtone);">No other blogs yet.</p>'; return; }
      grid.innerHTML = blogs.map(b => {
        const date = b.date_published ? new Date(b.date_published).toLocaleDateString('en-PH',{month:'short',year:'numeric'}) : '';
        const imgUrl = b.image ? (b.image.startsWith('http') ? b.image : 'http://localhost:8000' + b.image) : '';
        const imgEl = imgUrl
          ? `<img src="${imgUrl}" class="related-card-img" alt="${b.title}" style="width:100%;height:150px;object-fit:cover;">`
          : `<div class="related-card-img">🌿</div>`;
        return `
          <a href="/blogs/${b.slug}/" class="related-card card">
            ${imgEl}
            <div class="related-card-body">
              <h4 class="related-card-title">${b.title}</h4>
              ${date ? `<p class="related-card-date">${date}</p>` : ''}
            </div>
          </a>`;
      }).join('');
    } catch(e) {
      document.getElementById('related-grid').innerHTML = '';
    }
  }

  async function deleteBlog() {
    if (!confirm(`Move "${SLUG}" to trash?`)) return;
    try {
      await apiFetch(`/blog/${SLUG}`, { method: 'DELETE' });
      showToast('Blog moved to trash.');
      setTimeout(() => window.location.href = '/blogs/', 1000);
    } catch(e) {
      showToast('Could not delete. Check permissions.', true);
    }
  }

  loadBlog();
  loadRelated();
</script>
{% endblock %}
