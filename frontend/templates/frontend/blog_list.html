{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Blog — TOURSPOT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0D1B3E;
      --blue:    #1E3A8A;
      --accent:  #4F46E5;
      --ink:     #111827;
      --gray400: #9CA3AF;
      --gray500: #6B7280;
      --gray200: #E5E7EB;
      --gray100: #F3F4F6;
      --white:   #FFFFFF;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--gray100);
      color: var(--ink);
    }

    .portal-frame {
      border: 2px solid var(--blue);
      background: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP NAV ── */
    .topnav {
      padding: 16px 40px;
      border-bottom: 1px solid var(--gray200);
    }
    .brand { font-size: 1.05rem; font-weight: 800; letter-spacing: .02em; color: var(--navy); text-decoration: none; }
    .brand span { color: var(--accent); }

    /* ── HERO ── */
    .hero { text-align: center; padding: 36px 24px 24px; }
    .hero h1 { font-size: 2.1rem; font-weight: 800; color: var(--ink); }
    .hero h1 span { color: var(--accent); }
    .hero p {
      max-width: 600px; margin: 14px auto 0;
      color: var(--gray500); font-size: .85rem; line-height: 1.6;
    }

    /* ── SEARCH ── */
    .search-section { display: flex; justify-content: center; padding: 8px 24px 28px; }
    .search-box { position: relative; width: 100%; max-width: 480px; }
    .search-box input {
      width: 100%; padding: 10px 50px 10px 16px;
      border: 1.5px solid var(--gray200); border-radius: 22px;
      font-family: 'Inter', sans-serif; font-size: .85rem; outline: none;
      transition: border-color .15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box button {
      position: absolute; right: 4px; top: 4px; bottom: 4px;
      width: 36px; border: none; border-radius: 18px;
      background: var(--navy); color: var(--white);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .search-box button svg { width: 15px; height: 15px; }

    /* ── GRID ── */
    .grid-wrap { flex: 1; padding: 0 40px 32px; }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }
    @media (max-width: 980px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .blog-grid { grid-template-columns: 1fr; } }

    .blog-card {
      border: 1px solid var(--gray200);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--white);
      text-decoration: none;
      color: inherit;
      transition: box-shadow .15s, border-color .15s;
    }
    .blog-card:hover {
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      border-color: var(--gray400);
    }
    .blog-card img { width: 100%; height: 130px; object-fit: cover; display: block; background: var(--gray200); }
    .blog-card-body { padding: 14px 14px 16px; display: flex; flex-direction: column; flex: 1; }
    .blog-tag { color: var(--accent); font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px; }
    .blog-title { font-size: .95rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
    .blog-date { font-size: .72rem; color: var(--gray400); margin-bottom: 8px; }
    .blog-excerpt {
      font-size: .78rem; color: var(--gray500); line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      flex: 1;
    }
    .blog-readmore { font-size: .78rem; font-weight: 600; color: var(--accent); align-self: flex-start; }
    .blog-card:hover .blog-readmore { text-decoration: underline; }

    /* ── STATES ── */
    #loading { text-align: center; padding: 60px 0; display: none; }
    .spinner {
      width: 30px; height: 30px; margin: 0 auto;
      border: 3px solid var(--gray200); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #empty-state, #error-state {
      display: none; text-align: center; padding: 60px 20px; color: var(--gray500); font-size: .9rem;
    }

    /* ── PAGINATION ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 26px; }
    .page-btn {
      width: 28px; height: 28px; border-radius: 4px;
      border: 1.5px solid var(--accent); background: var(--white);
      color: var(--accent); font-size: .8rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover:not(:disabled) { background: var(--accent); color: var(--white); }
    .page-btn.active { background: var(--accent); color: var(--white); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── FOOTER ── */
    footer { background: var(--ink); color: rgba(255,255,255,.55); text-align: center; padding: 14px 24px; font-size: .8rem; }
  </style>
</head>
<body>

<div class="portal-frame">

  <nav class="topnav">
    <a class="brand" href="/">TOUR<span>SPOT</span></a>
  </nav>

  <main style="flex:1;">
    <div class="hero">
      <h1>Our <span>Blog</span></h1>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    </div>

    <div class="search-section">
      <div class="search-box">
        <input type="text" id="search" placeholder="Search" />
        <button type="button" onclick="document.getElementById('search').focus()" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>

    <div class="grid-wrap">
      <div id="loading"><div class="spinner"></div></div>
      <div id="empty-state">No blog posts found.</div>
      <div id="error-state">Could not load blog posts. Please try again later.</div>
      <div class="blog-grid" id="blog-grid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <footer>Copyright</footer>

</div>

<script>
  const PAGE_SIZE = 8;
  let allBlogs = [];
  let filteredBlogs = [];
  let currentPage = 1;
  let searchTimer;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function excerpt(text, max = 130) {
    if (!text) return '';
    return text.length > max ? text.slice(0, max).trim() + '…' : text;
  }

  async function loadBlogs() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'none';
    try {
      const res = await fetch('/api/blog/?limit=1000&offset=0');
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      allBlogs = data.results || data;
      applySearch();
    } catch (e) {
      document.getElementById('error-state').style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function applySearch() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    filteredBlogs = !q ? allBlogs : allBlogs.filter(b =>
      (b.title || '').toLowerCase().includes(q) || (b.description || '').toLowerCase().includes(q)
    );
    currentPage = 1;
    render();
  }

  function render() {
    const grid = document.getElementById('blog-grid');
    const total = filteredBlogs.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    if (!total) {
      grid.innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filteredBlogs.slice(start, start + PAGE_SIZE);

    grid.innerHTML = pageItems.map(b => `
      <a class="blog-card" href="/${encodeURIComponent(b.slug)}/">
        <img src="${b.image || ''}" alt="${escapeHtml(b.title)}" onerror="this.style.display='none'" />
        <div class="blog-card-body">
          <div class="blog-tag">Blog</div>
          <div class="blog-title">${escapeHtml(b.title)}</div>
          <div class="blog-date">${formatDate(b.date_published || b.date_created)}</div>
          <div class="blog-excerpt">${escapeHtml(excerpt(b.description))}</div>
          <span class="blog-readmore">Continue reading</span>
        </div>
      </a>
    `).join('');

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const p = document.getElementById('pagination');
    if (totalPages <= 1) { p.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&lt;</button>`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&gt;</button>`;
    p.innerHTML = html;
  }

  function goPage(n) {
    currentPage = n;
    render();
    window.scrollTo({ top: document.querySelector('.grid-wrap').offsetTop - 80, behavior: 'smooth' });
  }

  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applySearch, 350);
  });

  loadBlogs();
</script>

</body>
</html>
