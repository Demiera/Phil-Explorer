{% extends 'frontend/base.html' %}
{% block title %}Create Post — TOURSPOT{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
  <a href="/" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.5px solid #D1D5DB;color:#374151;text-decoration:none;font-size:1.1rem;">←</a>
  <h1 class="page-heading" style="margin-bottom:0;">CREATING POST</h1>
</div>

<div style="background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:32px;max-width:700px;">
  <form id="create-form" onsubmit="handleCreate(event)">
    <div class="form-group">
      <label class="form-label" for="title">TITLE</label>
      <input class="form-input" type="text" id="title" placeholder="Post title" required />
      <div class="form-error" id="title-err"></div>
    </div>
    <div class="form-group">
      <label class="form-label" for="description">CONTENT</label>
      <textarea class="form-input" id="description" rows="8" placeholder="Write your content here…" required style="resize:vertical;"></textarea>
      <div class="form-error" id="description-err"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Image</label>
      <div style="display:flex;gap:10px;align-items:center;">
        <input class="form-input" type="text" id="image-name" placeholder="" readonly style="flex:1;cursor:default;background:#F9FAFB;" />
        <label for="image-file" class="btn btn-secondary" style="cursor:pointer;padding:9px 16px;font-size:.85rem;white-space:nowrap;">Upload image</label>
        <input type="file" id="image-file" accept="image/*" style="display:none;" onchange="handleFile()" />
      </div>
      <p style="font-size:.75rem;color:#9CA3AF;margin-top:4px;">Upload a file less than 5MB.</p>
      <div class="form-error" id="image-err"></div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <button class="btn btn-primary" type="submit" id="publish-btn" style="flex:1;justify-content:center;padding:12px;">PUBLISH</button>
      <a href="/" class="btn btn-secondary" style="padding:12px 20px;">Cancel</a>
      <button class="btn" type="button" id="draft-btn" onclick="saveDraft()" style="padding:12px 16px;background:none;color:#374151;font-size:.85rem;">Save as Draft</button>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  if (!localStorage.getItem('access_token')) window.location.href = '/login/';

  let selectedFile = null;

  function handleFile() {
    const f = document.getElementById('image-file').files[0];
    if (f) { selectedFile=f; document.getElementById('image-name').value=f.name; }
  }

  async function submitPost(publish) {
    ['title','description','image'].forEach(f=>{ const e=document.getElementById(f+'-err'); if(e) e.textContent=''; });
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    if (!title || !description) { showToast('Title and content are required.','error'); return; }

    const btn = publish ? document.getElementById('publish-btn') : document.getElementById('draft-btn');
    btn.disabled=true; const orig=btn.textContent; btn.textContent='Saving…';

    const fd = new FormData();
    fd.append('title', title);
    fd.append('description', description);
    fd.append('published', publish ? 'true' : 'false');
    if (selectedFile) fd.append('image', selectedFile);

    try {
      await apiFetch('/blog/', { method:'POST', body: fd, headers:{} });
      showToast(publish ? 'Post published!' : 'Saved as draft.');
      setTimeout(()=>{ window.location.href = publish ? '/dashboard/' : '/drafts/'; }, 800);
    } catch(e) {
      btn.disabled=false; btn.textContent=orig;
      const errs = e?.data || {};
      let shown=false;
      Object.entries(errs).forEach(([k,v])=>{ const el=document.getElementById(k+'-err'); if(el){el.textContent=Array.isArray(v)?v[0]:v;shown=true;} });
      if(!shown) showToast(errs?.detail||errs?.error||'Could not save post.','error');
    }
  }

  function handleCreate(e) { e.preventDefault(); submitPost(true); }
  function saveDraft() { submitPost(false); }
</script>
{% endblock %}
