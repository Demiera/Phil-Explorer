{% extends 'frontend/authbase.html' %}
{% block title %}Sign Up — TOURSPOT{% endblock %}

{% block extra_head %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Rubik', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
    }
 
    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 56px 52px;
      background: #fff;
    }
    .left h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 36px;
      color: #111;
      max-width: 420px;
      width: 100%;
    }
    #register-form { max-width: 420px; width: 100%; }
    .form-footer { max-width: 420px; width: 100%; }
 
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .83rem; color: #991B1B;
      position: fixed;
      top: 24px;
      left: 25%;
      transform: translateX(-50%) translateY(0);
      max-width: 340px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      z-index: 1000;
      animation: dropDown .4s ease-out;
    }
    .alert.success {
      background: #F0FDF4;
      border: 1px solid #86EFAC;
      color: #166534;
    }
    .alert.success .alert-icon { color: #22C55E; }
    @keyframes dropDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-24px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    .alert-icon { color: #EF4444; font-size: 1rem; flex-shrink: 0; }
    .alert-close { margin-left: auto; background: none; border: none; cursor: pointer; color: #9CA3AF; font-size: 1rem; }
    .alert strong { display: block; font-weight: 600; }
    .alert.hidden { display: none; }
 
    /* ── FORM ── */
    .form-group { margin-bottom: 24px; }
    .name-row {
      display: flex;
      gap: 16px;
    }
    .name-row > div { flex: 1; }
    .form-label {
      display: block;
      font-size: .9rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .form-input {
      width: 100%;
      height: 50px;
      padding: 12px 16px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-family: 'Rubik', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
      color: #111;
      background: #fff;
    }
    .form-input::placeholder { color: #9CA3AF; }
    .form-input:focus { border-color: #4F46E5; }
    .form-input.error { border-color: #EF4444; background: #FEF2F2; }
    .show-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: .75rem; font-weight: 700; letter-spacing: .06em;
      color: #6B7280; background: none; border: none; cursor: pointer;
    }
 
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1E3A8A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Rubik', sans-serif;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
      letter-spacing: .02em;
    }
    .submit-btn:hover { background: #1e40af; }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
 
    .form-footer { margin-top: 20px; font-size: .9rem; color: #6B7280; text-align: center; }
    .form-footer a { color: #4F46E5; font-weight: 700; text-decoration: none; }
 
    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,.05), rgba(0,0,0,.5)),
                  url('https://images.unsplash.com/photo-1518509562904-e7ef99cdcc86?w=900&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
    }
    .right-text {
      color: #fff;
      text-align: center;
    }
    .right-text .eyebrow {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      font-size: 1rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .right-text .eyebrow::before,
    .right-text .eyebrow::after {
      content: ''; flex: 0 0 56px; height: 2px; background: #fff;
    }
    .right-text h2 {
      font-size: clamp(3.2rem, 7vw, 5.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .right {
        min-height: 40vh;
        order: -1;
        padding: 32px 20px;
      }
      .left {
        padding: 40px 24px;
      }
      .alert {
        left: 50%;
      }
    }
 
    @media (max-width: 480px) {
      .left { padding: 32px 18px; }
      .left h1 { font-size: 1.7rem; margin-bottom: 28px; }
      .form-group { margin-bottom: 18px; }
      .name-row { flex-direction: column; gap: 18px; }
      .right { padding: 24px 16px; min-height: 32vh; }
      .right-text .eyebrow {
        font-size: .75rem;
        gap: 10px;
      }
      .right-text .eyebrow::before,
      .right-text .eyebrow::after { flex: 0 0 30px; }
      .right-text h2 { font-size: clamp(2.2rem, 10vw, 3.2rem); }
      .alert {
        left: 50%;
        right: auto;
        width: calc(100% - 32px);
        max-width: none;
      }
    }
  </style>
{% endblock %}

{% block content %}
 <h1>Sign up</h1>
 
  <form id="register-form" onsubmit="handleRegister(event)">
    <div class="form-group name-row">
      <div>
        <label class="form-label" for="first-name">First Name</label>
        <input class="form-input" type="text" id="first-name" placeholder="First Name" required />
      </div>
      <div>
        <label class="form-label" for="last-name">Last Name</label>
        <input class="form-input" type="text" id="last-name" placeholder="Last Name" required />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="Email Address" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="password" placeholder="Password" required />
        <button type="button" class="show-btn" id="show-btn" onclick="togglePw('password','show-btn')">SHOW</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="confirm-password" placeholder="Confirm Password" required />
        <button type="button" class="show-btn" id="show-btn-confirm" onclick="togglePw('confirm-password','show-btn-confirm')">SHOW</button>
      </div>
    </div>
    <button class="submit-btn" type="submit" id="submit-btn">Register</button>
  </form>
 
  <div class="form-footer">
    Already have an account? <a href="/login/">Log in</a>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const API = 'http://localhost:8000/api';
 
  if (localStorage.getItem('access_token')) window.location.href = '/';
 
  function togglePw(inputId, btnId) {
    const inp = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'HIDE'; }
    else                          { inp.type = 'password'; btn.textContent = 'SHOW'; }
  }
 
  function showError(msg) {
    const alert = document.getElementById('error-alert');
    alert.classList.remove('success');
    document.querySelector('#error-alert strong').textContent = 'Registration Failed';
    document.getElementById('error-msg').textContent = msg;
    alert.classList.remove('hidden');
    // restart animation
    alert.style.animation = 'none';
    requestAnimationFrame(() => { alert.style.animation = 'dropDown .4s ease-out'; });
  }
 
  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
 
    if (password !== confirmPassword) {
      showError('Passwords do not match.');
      return;
    }
 
    document.getElementById('error-alert').classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Registering…';
 
    try {
      const res = await fetch(API + '/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: document.getElementById('first-name').value.trim(),
          last_name:  document.getElementById('last-name').value.trim(),
          email:      document.getElementById('email').value.trim(),
          password:   password,
          password2:  confirmPassword,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw data;
      localStorage.setItem('access_token', data.access);
      localStorage.setItem('user_email',   data.email);
      window.location.href = '/';
    } catch(err) {
      const msg = err?.error || err?.detail || 'Something went wrong. Please try again.';
      showError(msg);
      btn.disabled = false; btn.textContent = 'Register';
    }
  }
</script>
{% endblock %}
