{% extends 'frontend/base.html' %}
{% block title %}Log In — Phil Explorer{% endblock %}

{% block extra_head %}
<style>
  .auth-page {
    min-height: calc(100vh - 64px - 72px);
    display: flex; align-items: center; justify-content: center;
    padding: 48px 24px;
    background: linear-gradient(135deg, var(--mist) 0%, var(--sand) 100%);
  }
  .auth-card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 44px 40px 36px;
    width: 100%; max-width: 420px;
  }
  .auth-logo {
    text-align: center; margin-bottom: 28px;
  }
  .auth-logo .icon { font-size: 2.4rem; }
  .auth-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; color: var(--forest);
    margin-top: 8px;
  }
  .auth-logo p { font-size: .85rem; color: var(--midtone); margin-top: 4px; }
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: .85rem; color: var(--midtone);
  }
  .auth-footer a { color: var(--forest); font-weight: 600; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .submit-btn {
    width: 100%; padding: 12px;
    background: var(--forest); color: var(--white);
    border: none; border-radius: 8px;
    font-size: .97rem; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: var(--moss); }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
  .divider {
    border: none; border-top: 1px solid var(--border);
    margin: 24px 0;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🌿</div>
      <h1>Welcome back</h1>
      <p>Log in to your PhilExplorer account</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email" />
        <div class="form-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password" />
        <div class="form-error" id="password-error"></div>
      </div>
      <div class="form-error" id="global-error" style="margin-bottom:14px;text-align:center;"></div>
      <button class="submit-btn" type="submit" id="submit-btn">
        <span id="btn-text">Log in</span>
      </button>
    </form>

    <hr class="divider" />

    <p class="auth-footer">
      Don't have an account? <a href="/register/">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = '/';

  async function handleLogin(e) {
    e.preventDefault();
    const btn  = document.getElementById('submit-btn');
    const text = document.getElementById('btn-text');

    // Clear errors
    ['email-error','password-error','global-error'].forEach(id =>
      document.getElementById(id).textContent = '');

    btn.disabled = true;
    text.textContent = 'Logging in…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await apiFetch('/login/', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      setAuth(data);
      showToast('Logged in successfully! 🌿');
      setTimeout(() => window.location.href = '/', 700);
    } catch(err) {
      const msg = err?.data?.error || err?.data?.detail || 'Invalid email or password.';
      document.getElementById('global-error').textContent = msg;
      btn.disabled = false;
      text.textContent = 'Log in';
    }
  }
</script>
{% endblock %}
