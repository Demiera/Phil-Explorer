{% extends 'frontend/base.html' %}
{% block title %}Edit Post — TOURSPOT{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
  <a href="javascript:history.back()" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.5px solid #D1D5DB;color:#374151;text-decoration:none;font-size:1.1rem;">←</a>
  <h1 class="page-heading" style="margin-bottom:0;">EDITING POST</h1>
</div>

<div style="background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:32px;max-width:700px;">
  <div id="loading"><div class="spinner"></div></div>
  <form id="edit-form" onsubmit="handleUpdate(event)" style="display:none;">
    <div class="form-group">
      <label class="form-label">TITLE</label>
      <input class="form-input" type="text" id="title" required />
      <div class="form-error" id="title-err"></div>
    </div>
    <div class="form-group">
      <label class="form-label">CONTENT</label>
      <textarea class="form-input" id="description" rows="8" required style="resize:vertical;"></textarea>
      <div class="form-error" id="description-err"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Image</label>
      <div style="display:flex;gap:10px;align-items:center;">
        <input class="form-input" type="text" id="image-name" readonly style="flex:1;cursor:default;background:#F9FAFB;" />
        <label for="image-file" class="btn btn-secondary" style="cursor:pointer;padding:9px 16px;font-size:.85rem;white-space:nowrap;">Upload image</label>
        <input type="file" id="image-file" accept="image/*" style="display:none;" onchange="handleFile()" />
      </div>
      <p style="font-size:.75rem;color:#9CA3AF;margin-top:4px;">Upload a file less than 5MB.</p>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <button class="btn btn-primary" type="submit" id="publish-btn" style="flex:1;justify-content:center;padding:12px;">PUBLISH</button>
      <a href="javascript:history.back()" class="btn btn-secondary" style="padding:12px 20px;">Cancel</a>
      <button class="btn" type="button" onclick="saveDraft()" style="padding:12px 16px;background:none;color:#374151;font-size:.85rem;">Save as Draft</button>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  if (!localStorage.getItem('access_token')) window.location.href = '/login/';
  const SLUG = "{{ slug }}";
  const MODE = new URLSearchParams(window.location.search).get('mode'); // 'draft' | 'published' | null
  let selectedFile = null, isDraft = (MODE === 'draft');

  async function loadPost() {
    try {
      let blog;
      if (MODE === 'draft') {
        // Came from drafts dashboard — go straight to draft endpoint.
        blog = await apiFetch(`/blog/draft/${SLUG}/`);
        isDraft = true;
      } else if (MODE === 'published') {
        // Came from published dashboard — go straight to published endpoint.
        blog = await apiFetch(`/blog/${SLUG}/`);
        isDraft = false;
      } else {
        // Direct URL with no mode hint — probe published first, fall back to draft.
        try { blog = await apiFetch(`/blog/${SLUG}/`); isDraft = false; }
        catch(e) { blog = await apiFetch(`/blog/draft/${SLUG}/`); isDraft = true; }
      }
      document.getElementById('title').value = blog.title||'';
      document.getElementById('description').value = blog.description||'';
      if(blog.image) document.getElementById('image-name').value = blog.image.split('/').pop();
      document.getElementById('loading').style.display='none';
      document.getElementById('edit-form').style.display='block';
    } catch(e) {
      document.getElementById('loading').innerHTML='<p style="color:#EF4444;">Could not load post.</p>';
    }
  }

  function handleFile(){const f=document.getElementById('image-file').files[0];if(f){selectedFile=f;document.getElementById('image-name').value=f.name;}}

  async function submitUpdate(publish) {
    const btn=document.getElementById('publish-btn');
    btn.disabled=true; const orig=btn.textContent; btn.textContent='Saving…';
    const fd=new FormData();
    fd.append('title',document.getElementById('title').value.trim());
    fd.append('description',document.getElementById('description').value.trim());
    fd.append('published',publish?'true':'false');
    if(selectedFile) fd.append('image',selectedFile);
    // A draft post always uses the draft endpoint.
    // A published post being saved back as draft still uses the published endpoint
    // (the object lives in that queryset until the next page load after re-classification).
    const endpoint = isDraft ? `/blog/draft/${SLUG}/` : `/blog/${SLUG}/`;
    try{
      await apiFetch(endpoint,{method:'PATCH',body:fd,headers:{}});
      showToast(publish?'Post published!':'Saved as draft.');
      setTimeout(()=>{window.location.href=publish?'/dashboard/':'/drafts/';},800);
    }catch(e){
      btn.disabled=false;btn.textContent=orig;
      showToast(e?.data?.detail||'Could not save.','error');
    }
  }
  function handleUpdate(e){e.preventDefault();submitUpdate(true);}
  function saveDraft(){submitUpdate(false);}
  loadPost();
</script>
{% endblock %}
